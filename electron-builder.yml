appId: com.nextspacey.proxlyte
productName: Proxlyte
copyright: Copyright © 2026 Mohamed Ramadan
directories:
  output: dist
  buildResources: resources
files:
  - from: .
    filter:
      - package.json
      - app
      - resources
publish:
  provider: github
  owner: mramadan18
  repo: proxlyte-desktop
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico
nsis:
  artifactName: "${productName}-Setup-${version}.${ext}"
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  runAfterFinish: true
  installerIcon: "resources/icon.ico"
  uninstallerIcon: "resources/icon.ico"
  installerSidebar: "resources/installerSidebar.bmp"
  uninstallerSidebar: "resources/installerSidebar.bmp"
  license: resources/license.txt
  include: resources/installer.nsh
