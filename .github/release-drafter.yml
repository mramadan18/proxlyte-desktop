  We are pleased to announce the release of **Proxlyte** $RESOLVED_VERSION, a powerful and open-source proxy server for Windows. This update focuses on stability, performance, and build automation.

  ## 🚀 Direct Download Link

  | Operating System | File Type | Architecture | Download Link |
  | :--- | :--- | :--- | :--- |
  | **Windows 10/11** | 🪟 Setup (.exe) | **x64 (64-bit)** | [Download Setup (.exe)](https://github.com/mramadan18/proxlyte-desktop/releases/download/v$RESOLVED_VERSION/Proxlyte-Setup-$RESOLVED_VERSION.exe) |

  ---

  ## 🛠️ What's Changed
  $CHANGES

  ---

  ## ⚠️ Technical Information
  > [!TIP]
  > **Automatic Updates:** If you already have the application installed, it will automatically update in the background.
